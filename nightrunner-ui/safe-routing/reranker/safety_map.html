<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Safety-scored edges</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
    #status {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      z-index: 9999; background: white; padding: 8px 14px; border-radius: 6px;
      font-family: sans-serif; font-size: 13px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .legend {
      background: white; padding: 8px 12px; border-radius: 6px;
      font-family: sans-serif; font-size: 13px; line-height: 1.5;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .legend div { display: flex; align-items: center; gap: 6px; }
    .swatch { width: 14px; height: 4px; display: inline-block; }
  </style>
</head>
<body>
  <div id="status">Loading map...</div>
  <div id="map"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script>
    const statusEl = document.getElementById('status');

    if (typeof L === 'undefined') {
      statusEl.textContent = 'ERROR: Leaflet failed to load from CDN. Check your internet connection or try disabling ad-blockers for this page.';
    } else {
      statusEl.textContent = 'Leaflet loaded. Fetching safety_edges.geojson...';

      // preferCanvas is the single biggest performance lever here: with
      // ~22,000 edges, Leaflet's default SVG renderer creates one DOM
      // element per shape (tens of thousands of them), which is what
      // freezes the tab. Canvas draws everything onto one <canvas>
      // element instead - dramatically faster at this scale.
      const map = L.map('map', { preferCanvas: true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      map.setView([51.539, -0.146], 13); // provisional centre, refit once data loads

      function haversineM(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return 2 * R * Math.asin(Math.sqrt(a));
      }

      // Builds one Leaflet layer for a set of "edge"-role features plus
      // their matching "midpoint"-role markers (for short edges), with a
      // shared click popup. Used for both the safety layer and the
      // lighting layer below, rather than duplicating this logic twice.
      function buildEdgeLayer(edgeRole, midpointRole, allFeatures, popupHtml) {
        const edgeFeatures = allFeatures.filter(f => f.properties.feature_role === edgeRole);
        const midpointFeatures = allFeatures.filter(f => f.properties.feature_role === midpointRole);

        // FeatureGroup (not plain LayerGroup) specifically because it
        // implements getBounds() by recursing into its children - needed
        // below for L.featureGroup([safety.group, lighting.group]).getBounds()
        // to work; a plain LayerGroup has no getBounds() and would throw.
        const group = L.featureGroup();

        const lines = L.geoJSON({ type: 'FeatureCollection', features: edgeFeatures }, {
          style: feature => ({
            color: feature.properties.color,
            weight: 5,
            opacity: 1,
          }),
        });
        // Single shared popup bound via one delegated click handler,
        // rather than binding thousands of individual popups up front -
        // much cheaper to set up, identical result for the user.
        lines.on('click', (e) => {
          L.popup().setLatLng(e.latlng).setContent(popupHtml(e.layer.feature.properties)).openOn(map);
        });
        lines.addTo(group);

        // Midpoint markers only for genuinely short edges (under 15m),
        // where the line itself can be hard to see at normal zoom.
        const shortEdges = midpointFeatures.filter((_f, i) => {
          const edge = edgeFeatures[i];
          if (!edge) return false;
          const c = edge.geometry.coordinates;
          if (c.length < 2) return false;
          const [lon1, lat1] = c[0];
          const [lon2, lat2] = c[c.length - 1];
          return haversineM(lat1, lon1, lat2, lon2) < 15;
        });
        shortEdges.forEach(feature => {
          const [lon, lat] = feature.geometry.coordinates;
          const p = feature.properties;
          // circleMarker's radius is in fixed screen pixels (unlike
          // L.circle, which is a real-world radius that shrinks/grows
          // with zoom) - so this stays the same visible size at any zoom
          // level with no extra work. 30% smaller than before, with a
          // floor so low safety-tag values (and lighting markers, which
          // have no safety_tag_value) never shrink below something
          // clickable/visible.
          const radius = Math.max(4, (5 + (p.safety_tag_value || 3)) * 0.7);
          L.circleMarker([lat, lon], {
            radius,
            color: '#000000',
            weight: 1,
            fillColor: p.color,
            fillOpacity: 0.5,
          })
            .bindPopup(popupHtml(p))
            .addTo(group);
        });

        return { group, edgeFeatures, shortCount: shortEdges.length };
      }

      fetch('safety_edges.geojson')
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status} fetching safety_edges.geojson`);
          return r.json();
        })
        .then(data => {
          statusEl.textContent = `Loaded ${data.features.length} features. Rendering...`;

          const safety = buildEdgeLayer('edge', 'midpoint', data.features, p =>
            `osmid: ${p.osmid}<br>safety_tag_value: ${p.safety_tag_value}<br>cost factor: ${p.cost_factor}`);
          const lighting = buildEdgeLayer('lighting_edge', 'lighting_midpoint', data.features, p =>
            `osmid: ${p.osmid}<br>lit: ${p.lit}`);

          safety.group.addTo(map);
          lighting.group.addTo(map);

          L.control.layers(null, {
            'Safety risk': safety.group,
            'Unlit streets': lighting.group,
          }, { collapsed: false }).addTo(map);

          const totalRendered = safety.edgeFeatures.length + lighting.edgeFeatures.length;
          statusEl.textContent = `Rendered ${safety.edgeFeatures.length} risky edges + ` +
            `${lighting.edgeFeatures.length} unlit edges.`;
          setTimeout(() => statusEl.remove(), 2500);

          const allBounds = L.featureGroup([safety.group, lighting.group]).getBounds();
          if (allBounds.isValid()) {
            map.fitBounds(allBounds, { padding: [20, 20] });
          }
        })
        .catch(err => {
          statusEl.textContent = 'ERROR: ' + err.message +
            ' - make sure safety_edges.geojson is in the same folder as this HTML file, ' +
            'and that you generated it with build_safety_geojson.py.';
          console.error(err);
        });

      const legend = L.control({ position: 'bottomright' });
      legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<strong>Risk tier (safety_tag_value)</strong><br>' +
          [[2,'#FFD580'],[4,'#FF9900'],[6,'#FF3300'],[8,'#CC0000'],[11,'#660000']]
            .map(([tag, color]) => `<div><span class="swatch" style="background:${color}"></span> tag ${tag}</div>`)
            .join('') +
          '<br><strong>Lighting</strong><br>' +
          '<div><span class="swatch" style="background:#1f3d99"></span> confirmed unlit</div>';
        return div;
      };
      legend.addTo(map);
    }
  </script>
</body>
</html>
